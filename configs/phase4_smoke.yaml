# Phase 4 — Smoke Test Configuration
experiment_name: phase4_smoke
phase: 4
results_dir: results/phase4/

model:
  d_z: 16
  k_sparse: 2
  n_settle: 10
  eta_z: 0.03
  eta_D: 0.005
  eta_E: 0.005
  eta_R: 0.003
  rho: 0.5
  lambda_lat: 0.1
  lambda_sparse: 0.01
  use_sparsity: true
  use_recurrent: true
  use_lateral: false
  importance_decay: 0.005

memory:
  capacity: 64
  write_error_threshold: 0.15
  write_novelty_threshold: 0.10
  importance_decay: 0.999
  min_similarity_to_skip_write: 0.95
  replay_buffer_size: 32

training:
  n_tasks: 4
  train_chars_per_domain: 200
  eval_chars_per_domain: 100
  epochs_per_domain: 1
  n_sleep_steps: 2
  n_sleep_replay: 16
  sleep_lr_scale: 0.2
  importance_protect_threshold: 0.6
  log_every: 50
  seed: 42

neurogenesis:
  enabled: true
  alpha: 1.0
  beta: 0.5
  gamma: 0.3
  delta: 0.4
  kappa: 0.3
  lambda_cost: 0.01
  threshold: 0.40
  consecutive_n: 10
  max_units: 64
  prune_interval: 100
  usage_threshold: 0.05
  importance_threshold: 0.01
  redundancy_threshold: 0.90
  maturity_floor: 0.05
